<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | strip_html }} — {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.scss' | relative_url }}">
  {% seo %}
</head>
<body>
  <div class="wrapper">
    <header class="site-header">
      <h1 class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Wpisy</a>
        <a href="{{ '/zasoby/' | relative_url }}">Zasoby</a>
        <a href="{{ '/produkty/' | relative_url }}">Produkty</a>
      </nav>
    </header>

    <article class="post">
      <header class="post-header">
        <h1 class="post-title">{{ page.title }}</h1>
        <p class="post-meta">{{ page.date | date: "%d %m %Y" }}</p>
      </header>
      <div class="post-content">
        {{ content }}
      </div>
    </article>

    <footer class="site-footer">
      Notatki z rynku. Bez porad inwestycyjnych.
    </footer>
  </div>
</body>
</html>
